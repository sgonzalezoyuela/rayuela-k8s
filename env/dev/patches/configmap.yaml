# Dev environment configuration overrides
apiVersion: v1
kind: ConfigMap
metadata:
  name: rayuela-config
data:
  # Spring profile for dev
  SPRING_PROFILES_ACTIVE: "dev"

  # Application metadata
  RAYUELA_ENV: "Desarrollo"
  RAYUELA_VERSION: "0.5.18"

  # OAuth2/OIDC issuer (Auth0 tenant)
  OIDC_ISSUER_URI: "https://rayuela.us.auth0.com/"

  # Logging - more verbose for dev
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_RAYUELA: "DEBUG"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: "DEBUG"

  # Show SQL in dev for debugging
  SPRING_JPA_SHOW_SQL: "false"

  # Tenant schemas to create during init (comma-separated UUIDs)
  # Obispado de Cruz del Eje + Dev Tenant
  TENANT_SCHEMAS: "f780d30d-20a4-4d0a-a2f7-b3a1523eb3d6,df766dc2-6d4c-44d4-90ad-19d9ab69fa9d"
