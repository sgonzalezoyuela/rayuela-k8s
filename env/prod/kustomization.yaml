apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Rayuela Production Environment
# Deploy: kubectl apply -k env/prod
# Namespace: rayuela-prod

namespace: rayuela-prod

resources:
  - namespace.yaml
  - ../../base
  - sealed-secrets/secrets.yaml
  - sealed-secrets/backup-secrets.yaml
  - backup

patches:
  # App pull policy for prod
  - path: patches/app-image.yaml
    target:
      kind: Deployment
      name: rayuela
  
  # Prod resource limits (larger, more replicas)
  - path: patches/resources.yaml
    target:
      kind: Deployment
      name: rayuela

  # Prod database storage (larger)
  - path: patches/db-storage.yaml
    target:
      kind: StatefulSet
      name: rayuela-db

  # Prod-specific configuration
  - path: patches/configmap.yaml
    target:
      kind: ConfigMap
      name: rayuela-config

configMapGenerator:
  # Production SQL seed data files
  - name: rayuela-sql-data
    files:
      - sql/central-data.sql
      - sql/convenios-data.sql
      - sql/cargos-data.sql
      - sql/conceptos-data.sql
      - sql/concepto-versiones-data.sql
      - sql/actividades-data.sql
      - sql/modalidades-contratacion-data.sql
      - sql/situaciones-revista-nac-data.sql
      - sql/zonas-data.sql
      - sql/tenant1-data.sql
      - sql/tenant2-data.sql

# Image tag managed here — keep in sync with RAYUELA_VERSION in patches/configmap.yaml
images:
  - name: ghcr.io/sgonzalezoyuela/rayuela
    newName: cr.lab.atricore.io/sgonzalezoyuela/rayuela
    newTag: "0.5.18"

labels:
  - pairs:
      environment: prod
    includeSelectors: false

commonAnnotations:
  rayuela.grex.com.ar/environment: "production"
  rayuela.grex.com.ar/domain: "rayue.la"
